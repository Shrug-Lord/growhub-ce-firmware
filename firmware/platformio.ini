; GrowHub Community Edition Firmware
; Target: ESP32-WROOM-32 (ESP32-D0WDQ6)
; Build: PlatformIO + ESP-IDF framework

[env:growhub]
platform = espressif32
board = esp32dev
framework = espidf

; Match original Niwa partition layout for OTA compatibility
board_build.partitions = partitions.csv

; Monitor settings
monitor_speed = 115200

; Flash settings — 4MB flash, DIO mode
board_build.flash_mode = dio
board_upload.flash_size = 4MB

; Build flags
build_flags =
    -DGROWHUB_VERSION=\"1.0.0C\"
