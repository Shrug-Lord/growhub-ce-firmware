name: Release firmware assets

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version or tag, for example v1.0.0C"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and attach release assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache PlatformIO core + toolchains
        uses: actions/cache@v4
        with:
          path: |
            firmware/.platformio-core/.cache
            firmware/.platformio-core/packages
            firmware/.platformio-core/platforms
          key: ${{ runner.os }}-pio-release-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-release-

      - name: Verify release version matches firmware
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${DISPATCH_VERSION}"
          fi

          tag_version="${version#v}"
          fw_version="$(sed -nE 's/^[[:space:]]*-DGROWHUB_VERSION=\\\"([^\\\"]+)\\\"/\1/p' firmware/platformio.ini)"
          if [ -z "$fw_version" ]; then
            echo "Could not read GROWHUB_VERSION from firmware/platformio.ini" >&2
            exit 1
          fi

          if [ "$tag_version" != "$fw_version" ]; then
            echo "Release version mismatch: tag/input '$version' vs GROWHUB_VERSION '$fw_version'" >&2
            exit 1
          fi

      - name: Build release bundle
        id: package
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${DISPATCH_VERSION}"
          fi

          VERSION="$version" scripts/package-first-flash.sh
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_dir=dist/growhub-ce-$version" >> "$GITHUB_OUTPUT"

      - name: Create draft release if needed
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "$VERSION" >/dev/null 2>&1; then
            exit 0
          fi

          gh release create "$VERSION" \
            --draft \
            --target "$GITHUB_SHA" \
            --title "Growhub CE $VERSION" \
            --notes "Draft release generated by GitHub Actions. Review attached assets before publishing."

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.package.outputs.version }}
          RELEASE_DIR: ${{ steps.package.outputs.release_dir }}
        run: |
          set -euo pipefail
          find "$RELEASE_DIR" -maxdepth 1 -type f -print0 \
            | xargs -0 gh release upload "$VERSION" --clobber
