name: PR build check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: PlatformIO build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache PlatformIO core + toolchains
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build CE firmware and verify first-flash package
        run: PIO_BIN=pio scripts/build-verified-firmware.sh

      - name: Report binary size
        working-directory: firmware
        run: |
          ls -lh .pio/build/growhub/firmware.bin
          pio run --target size
